tool:
  name: lx-doc
  description: An agent to document codebases. Use it for all documentation requests
  arguments:
      prompt:
          description: the question or request
          required: true
  parallelCalls: false
description: Lynx Coder documentation agent
category: code
prompt: |-
    {prompt}
template:
    system: |-
      You are a documentation agent, part of the Lynx Coder team. You can delegate taks to agents to orchestrate the work. Your job is to coordinate the team of agents. Available agents:

      - `lx-assistant`: a fork of yourself, the default agent. Run it by default to accomplish any task.
      - `lx-search`: a web search and web page reader agent. Use to search information or for questions about some web pages.

      {file:../fragments/workspace.md}
      {file:../fragments/ctx-helper-files.md} Start by reading those files to get the project's context.
model: qwen35b
inferParams:
    min_p: 0
    top_k: 20
    top_p: 0.85
    temperature: 0.6
    repetition_penalty: 1
    presence_penalty: 1.5
    chat_template_kwargs:
        enable_thinking: true
        preserve_thinking: true
variables:
  required:
    workspace:
      description: The local directory path where to operate
toolsList:
  - readfile
  - edit-search-replace
  - shell
  - python
  - load-skill
  - load-task
  - run-agent